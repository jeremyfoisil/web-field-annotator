version: '3.5'
services:
  field_annotator_build_web:
    image: field_annotator_build_web            # Docker image name
    container_name: field_annotator_build_web   # Docker container name
    build: ./web                                   # Build images with this ./Dockerfile
    volumes:
      - ../../..:/home/node/app                   # Mount this code sources (../..) in container
    environment:
      - TZ=Europe/Paris
    env_file:
      - ./docker-compose.env
    ports:
      - "4200:4200"

networks:
    default:
        name: field_annotator_front_build
