services:
  field_annotator_web:
    image: field_annotator_web            # Docker image name
    container_name: field_annotator_web   # Docker container name
    build: ./web                                   # Build images with this ./Dockerfile
    volumes:
      - ../..:/home/node/app                   # Mount this code sources (../..) in container
    environment:
      - TZ=Europe/Paris
    env_file:
      - ./docker-compose.env
    ports:
      - "3000:5173"

networks:
  default:
    name: field_annotator_frontend_dev
